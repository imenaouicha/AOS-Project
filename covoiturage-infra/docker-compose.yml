version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: covoiturage-postgres
    environment:
      POSTGRES_DB: covoiturage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - covoiturage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: covoiturage-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "8085:5672"
      - "15672:15672"
    networks:
      - covoiturage-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  consul:
    image: consul:1.15
    container_name: covoiturage-consul
    command: agent -server -bootstrap-expect=1 -client=0.0.0.0 -ui
    ports:
      - "8500:8500"
    networks:
      - covoiturage-net
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service 1: Frontend (Django)
  frontend:
    build: ../covoiturage-frontend
    container_name: covoiturage-frontend
    ports:
      - "8005:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      AUTH_SERVICE_URL: http://auth-service:8001
      TRIP_SERVICE_URL: http://trip-service:8002
      BOOKING_SERVICE_URL: http://booking-service:8003
    depends_on:
      - rabbitmq
      - postgres
      - consul
    networks:
      - covoiturage-net
    command: python manage.py runserver 0.0.0.0:8000

  # Service 2: Consumer (RabbitMQ)
  consumer:
    build: ../covoiturage-frontend
    container_name: covoiturage-consumer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      - rabbitmq
    networks:
      - covoiturage-net
    command: python manage.py consume_rabbitmq

volumes:
  postgres_data:

networks:
  covoiturage-net:
    driver: bridge