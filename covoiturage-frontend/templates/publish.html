{% extends 'base.html' %}

{% block title %}Publish Trip{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header"><h3>Publish a Trip</h3></div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Departure City</label>
                                <input type="text" name="departure" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Destination City</label>
                                <input type="text" name="destination" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Departure Date</label>
                                <input type="date" name="departure_date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Departure Time</label>
                                <input type="time" name="departure_time" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Available Seats</label>
                                <input type="number" name="available_seats" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price per Seat (DA)</label>
                                <input type="number" step="0.01" name="price_per_seat" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Publish Trip</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
